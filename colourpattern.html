<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10x10 Color Pattern Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #ffffff;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #111;
    letter-spacing: 0.5px;
  }

  .grid {
    display: grid;
    grid-template-rows: repeat(10, 60px);
    grid-template-columns: repeat(10, 60px);
    border: 2.5px solid #111;
    gap: 0;
  }

  .cell {
    width: 60px;
    height: 60px;
    border: 1.5px solid #111;
  }

  /* Row 1 — solid red */
  .r1 { background: #CC1111; }

  /* Row 2 — solid blue */
  .r2 { background: #1B4FC5; }

  /* Row 3 — solid green */
  .r3 { background: #1A7A1A; }

  /* Row 4 — checkerboard red/white, starts red */
  .r4-a { background: #CC1111; }
  .r4-b { background: #FFFFFF; }

  /* Row 5 — checkerboard white/red, starts white */
  .r5-a { background: #FFFFFF; }
  .r5-b { background: #CC1111; }

  /* Row 6 — checkerboard yellow/green, starts yellow */
  .r6-a { background: #F5C800; }
  .r6-b { background: #1A7A1A; }

  /* Row 7 — checkerboard green/yellow, starts green */
  .r7-a { background: #1A7A1A; }
  .r7-b { background: #F5C800; }

  /* Row 8 — pink gradient left=hot pink → right=light pink */
  .r8-1 { background: #FF1C7A; }
  .r8-2 { background: #FF2E82; }
  .r8-3 { background: #FF4690; }
  .r8-4 { background: #FF5E9C; }
  .r8-5 { background: #FF78AB; }
  .r8-6 { background: #FF90BB; }
  .r8-7 { background: #FFA8CC; }
  .r8-8 { background: #FFB8D8; }
  .r8-9 { background: #FFCBE4; }
  .r8-10 { background: #FFD8EF; }

  /* Row 9 — alternating hot pink / light pink */
  .r9-a { background: #FF2080; }
  .r9-b { background: #FFB0D4; }

  /* Row 10 — solid black */
  .r10 { background: #111111; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>10x10 Color Pattern Table</h1>
  <div class="grid">

    <!-- Row 1: Solid Red -->
    <div class="cell r1"></div><div class="cell r1"></div><div class="cell r1"></div>
    <div class="cell r1"></div><div class="cell r1"></div><div class="cell r1"></div>
    <div class="cell r1"></div><div class="cell r1"></div><div class="cell r1"></div>
    <div class="cell r1"></div>

    <!-- Row 2: Solid Blue -->
    <div class="cell r2"></div><div class="cell r2"></div><div class="cell r2"></div>
    <div class="cell r2"></div><div class="cell r2"></div><div class="cell r2"></div>
    <div class="cell r2"></div><div class="cell r2"></div><div class="cell r2"></div>
    <div class="cell r2"></div>

    <!-- Row 3: Solid Green -->
    <div class="cell r3"></div><div class="cell r3"></div><div class="cell r3"></div>
    <div class="cell r3"></div><div class="cell r3"></div><div class="cell r3"></div>
    <div class="cell r3"></div><div class="cell r3"></div><div class="cell r3"></div>
    <div class="cell r3"></div>

    <!-- Row 4: Red/White checkerboard starts Red -->
    <div class="cell r4-a"></div><div class="cell r4-b"></div><div class="cell r4-a"></div>
    <div class="cell r4-b"></div><div class="cell r4-a"></div><div class="cell r4-b"></div>
    <div class="cell r4-a"></div><div class="cell r4-b"></div><div class="cell r4-a"></div>
    <div class="cell r4-b"></div>

    <!-- Row 5: White/Red checkerboard starts White -->
    <div class="cell r5-a"></div><div class="cell r5-b"></div><div class="cell r5-a"></div>
    <div class="cell r5-b"></div><div class="cell r5-a"></div><div class="cell r5-b"></div>
    <div class="cell r5-a"></div><div class="cell r5-b"></div><div class="cell r5-a"></div>
    <div class="cell r5-b"></div>

    <!-- Row 6: Yellow/Green checkerboard starts Yellow -->
    <div class="cell r6-a"></div><div class="cell r6-b"></div><div class="cell r6-a"></div>
    <div class="cell r6-b"></div><div class="cell r6-a"></div><div class="cell r6-b"></div>
    <div class="cell r6-a"></div><div class="cell r6-b"></div><div class="cell r6-a"></div>
    <div class="cell r6-b"></div>

    <!-- Row 7: Green/Yellow checkerboard starts Green -->
    <div class="cell r7-a"></div><div class="cell r7-b"></div><div class="cell r7-a"></div>
    <div class="cell r7-b"></div><div class="cell r7-a"></div><div class="cell r7-b"></div>
    <div class="cell r7-a"></div><div class="cell r7-b"></div><div class="cell r7-a"></div>
    <div class="cell r7-b"></div>

    <!-- Row 8: Hot Pink gradient left to right -->
    <div class="cell r8-1"></div><div class="cell r8-2"></div><div class="cell r8-3"></div>
    <div class="cell r8-4"></div><div class="cell r8-5"></div><div class="cell r8-6"></div>
    <div class="cell r8-7"></div><div class="cell r8-8"></div><div class="cell r8-9"></div>
    <div class="cell r8-10"></div>

    <!-- Row 9: Alternating Hot Pink / Light Pink -->
    <div class="cell r9-a"></div><div class="cell r9-b"></div><div class="cell r9-a"></div>
    <div class="cell r9-b"></div><div class="cell r9-a"></div><div class="cell r9-b"></div>
    <div class="cell r9-a"></div><div class="cell r9-b"></div><div class="cell r9-a"></div>
    <div class="cell r9-b"></div>

    <!-- Row 10: Solid Black -->
    <div class="cell r10"></div><div class="cell r10"></div><div class="cell r10"></div>
    <div class="cell r10"></div><div class="cell r10"></div><div class="cell r10"></div>
    <div class="cell r10"></div><div class="cell r10"></div><div class="cell r10"></div>
    <div class="cell r10"></div>

  </div>
</div>
</body>
</html>
